<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Couples Website</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">
  <!-- Matrix hearts background -->
  <canvas id="matrix"></canvas>

  <!-- Side menu -->
  <div id="side-menu" class="side-menu">
    <button id="close-menu">×</button>
    <nav>
      <button data-target="her-photos">Her Photos</button>
      <button data-target="our-photos">Our Photos</button>
      <button data-target="letter">Letter</button>
      <button data-target="open-when">Open When</button>
    </nav>
  </div>
  <button id="menu-btn" class="menu-btn">☰</button>

  <!-- Greetings & MOTD -->
  <div class="top-section">
    <p id="greeting">Good Morning</p>
    <img src="images/her1.jpg" alt="Main Her Pic" id="main-pic" class="main-pic">
    <p id="motd">Message of the Day</p>
  </div>

  <!-- Photos Sections -->
  <section id="her-photos">
    <h2>Her Photos</h2>
    <div class="photo-grid" id="her-photo-grid"></div>
  </section>

  <section id="our-photos">
    <h2>Our Photos</h2>
    <div class="photo-grid" id="our-photo-grid"></div>
  </section>

  <!-- Letter Section -->
  <section id="letter">
    <h2>Letter</h2>
    <div class="letter-box">
      <p>Dear Ririta, I just want you to know that...</p>
    </div>
    <img src="images/signature.png" alt="Signature" class="signature">
  </section>

  <!-- Open When Section -->
  <section id="open-when">
    <h2>Open When</h2>
    <div class="heart-counter">
      <img src="images/loveHeart.png" id="heart-btn" alt="Heart">
      <span id="heart-count">0</span> times someone thought of you
    </div>
    <div class="open-buttons">
      <button data-type="sad">Sad</button>
      <button data-type="missme">Miss Me</button>
      <button data-type="cantsleep">Can't Sleep</button>
      <button data-type="motivation">Need Motivation</button>
    </div>
    <div class="open-text-box" id="open-text-box"></div>
  </section>

  <!-- Music Player -->
  <div class="music-player">
    <audio id="music" controls autoplay loop>
      <source src="apocalypse.mp3" type="audio/mp3">
      <source src="songrita.mp3" type="audio/mp3">
    </audio>
  </div>

  <script src="script.js"></script>
</body>
</html>
