<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Rita ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
</head>


<body class="homePage">

<!-- HEART BACKGROUND -->
<div class="hearts"></div>


<!-- MENU BUTTON -->
<button id="menuToggle">☰</button>


<!-- SIDE MENU -->
<div id="menu">

<button id="menuClose">✕</button>

<div id="menuContent">

<button onclick="scrollToSection('msgOfDayBox')">Message of the Day</button>

<button onclick="scrollToSection('loveLetterTitleBox')">Love Letter</button>

<button onclick="scrollToSection('mainPhoto')">Main Photo</button>

<button onclick="scrollToSection('loveContainer')">Love Counter</button>

<button onclick="scrollToSection('openSection')">Open When</button>

<button onclick="scrollToSection('photoWallSection')">Photo Wall</button>

<button onclick="toggleMusic('apocalypse')">Play Apocalypse</button>

<button onclick="toggleMusic('songrita')">Play Rita Song</button>

<button onclick="pauseMusic()">Pause Music</button>

</div>

<div class="menuBottom">
<img src="images/menuphoto.png">
</div>

</div>



<div class="container">

<!-- GM/GN + COUNTER -->
<div id="gmgnCounterBox">
<div id="gmgn"></div>
<div id="counter"></div>
</div>



<!-- MESSAGE OF THE DAY -->
<div id="msgOfDayBox">

<div id="msgOfDayTitleBox">Message of the Day</div>

<div id="msgOfDayText"></div>

</div>



<!-- LOVE LETTER -->
<div id="loveLetterTitleBox">A Letter For You 💌</div>

<div id="loveLetterBox"></div>



<!-- MAIN PHOTO -->
<img id="mainPhoto" src="images/her1.jpg">



<!-- LOVE HEART -->
<div id="loveContainer">

<img id="loveHeart" src="images/heart.png">

<div class="loveCounters">
You clicked the heart <span id="loveNumber">0</span> times ❤️
</div>

</div>



<!-- OPEN WHEN -->
<div id="openSection">

<h2>Open When...</h2>

<div class="openContainer">

<div class="openCard" onclick="openMsg(0)">Sad</div>
<div class="openCard" onclick="openMsg(1)">Miss Me</div>
<div class="openCard" onclick="openMsg(2)">Can't Sleep</div>
<div class="openCard" onclick="openMsg(3)">Need Motivation</div>
<div class="openCard" onclick="openMsg(4)">Thinking About Us</div>

</div>

<div id="openTextBox">
<div id="openText"></div>
</div>

</div>



<!-- PHOTO WALL -->
<div id="photoWallSection">

<h2>Our Memories 📸</h2>

<div class="photoWall">

<img src="images/her1.jpg">
<img src="images/her2.jpg">
<img src="images/her3.jpg">
<img src="images/her4.jpg">
<img src="images/her5.jpg">
<img src="images/her6.jpg">
<img src="images/her7.jpg">
<img src="images/her8.jpg">
<img src="images/her9.jpg">
<img src="images/her10.jpg">
<img src="images/her11.jpg">
<img src="images/her12.jpg">
<img src="images/her13.jpg">
<img src="images/her14.jpg">
<img src="images/her15.jpg">

</div>

</div>



<!-- IMAGE MODAL (for zoom effect) -->
<div id="imageModal">
<img id="modalImage">
</div>



<!-- QUOTE -->
<div class="quote">
"Every love story is beautiful, but ours is my favorite."
</div>


</div>



<script src="script.js"></script>

</body>
</html>
