<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little World 💗</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Dancing+Script&display=swap" rel="stylesheet">
</head>
<body class="homePage">


<!-- Background -->
<div class="hearts"></div>

<div class="container">
  <!-- SLIDE-OUT MENU -->
  <button id="menuToggle">☰</button>
  <div id="menu">
    <div id="menuContent">
<button id="menuClose">✕</button>
      <!-- Top Section: Navigation -->
      <div class="menuTop">
        <button onclick="scrollToSection('gallery')">Gallery</button>
        <button onclick="scrollToSection('ourPhotos')">Our Photos</button>
        <button onclick="scrollToSection('loveLetterBox')">Love Letter</button>
      </div>

      <!-- Middle Section: Music Player -->
      <div class="menuMusic">
        <p>Music Player 🎵</p>
        <button onclick="toggleMusic('apocalypse')">▶ Apocalypse</button>
        <button onclick="toggleMusic('songrita')">▶ Just The Two Of Us</button>
        <button onclick="pauseMusic()">⏸ Pause</button>
      </div>

      <!-- Bottom Section: Your Name + Signature -->
      <div class="menuBottom">
        <p>Ahmed Sghaier</p>
        <img src="images/signature.png" alt="Signature" id="signatureImg">
      </div>
    </div>
  </div>

  <!-- GM/GN + Counter Box -->
  <div id="gmgnCounterBox">
    <span id="gmgn"></span>
    <span id="counter"></span>
  </div>
  <h2 id="ritaName"></h2>

  <!-- Main photo -->
  <img id="mainPhoto" alt="Main Photo">

<!-- Message of the Day Section -->
<h2 class="sectionTitle" id="msgOfDayTitle">Message of the day for my love riti💗</h2>
<div id="msgOfDayBox">
  <p id="msgOfDayText">Loading your special message...</p>
</div>

  <!-- Love Letter Section -->
  <h2 class="sectionTitle" id="loveLetterTitle">A Little Letter for You 💌</h2>
  <div class="loveLetterBox" id="loveLetterBox"></div>

  <!-- Animated Love Counter -->
  <div id="loveContainer">
  <img id="loveHeart" src="images/loveHeart.png">
  <div class="loveCounters">
    <p id="loveText">Someone can’t stop thinking about you 💗 <span id="loveNumber">0</span></p>
  </div>
</div>

  <!-- Open When Messages -->
  <h2 class="sectionTitle">Open When...</h2>
  <div class="openContainer">
    <div class="openCard" onclick="openMsg(0)">Sad</div>
    <div class="openCard" onclick="openMsg(1)">Miss Me</div>
    <div class="openCard" onclick="openMsg(2)">Can't Sleep</div>
    <div class="openCard" onclick="openMsg(3)">Need Motivation</div>
    <div class="openCard" onclick="openMsg(4)">Thinking About Us</div>
  </div>
  <div id="openTextBox">
    <p id="openText"></p>
  </div>

  <!-- Photo Wall -->
  <h2 id="gallery" class="gallery">My Favorite Pictures of You</h2>
  <div class="photoWall">
    <img src="images/her1.jpg">
    <img src="images/her2.jpg">
    <img src="images/her3.jpg">
    <img src="images/her4.jpg">
    <img src="images/her5.jpg">
    <img src="images/her6.jpg">
    <img src="images/her7.jpg">
    <img src="images/her8.jpg">
    <img src="images/her9.jpg">
    <img src="images/her10.jpg">
    <img src="images/her11.jpg">
    <img src="images/her12.jpg">
    <img src="images/her13.jpg">
    <img src="images/her14.jpg">
    <img src="images/her15.jpg">
  </div>

<br>
  <!-- Our Photos Section -->
  <h2 id="ourPhotos" class="sectionTitle">Our Photos Together 💖</h2>
  <div id="ourPhotosSection" class="photoWall"></div>

  <!-- Random Quote -->
  <p id="quote" class="quote"></p>
</div>

<script src="script.js"></script>
</body>
</html>
