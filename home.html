<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Rita ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stars"></div>
<div class="sunrise"></div>
<div class="rain"></div>

<div class="card">
  <h1 id="title"></h1>
  <img src="herphoto.jpg" alt="Rita">
  <p id="message"></p>
  <div id="counter"></div>

  <div class="open-container">
    <div class="open-card" onclick="openMsg(0)">Open when sad</div>
    <div class="open-card" onclick="openMsg(1)">Open when you miss me</div>
    <div class="open-card" onclick="openMsg(2)">Open when you can't sleep</div>
  </div>

  <p id="openText"></p>

  <div id="loveHeart" onclick="clickLove()">❤️</div>
  <div id="loveCount">0</div>

  <audio id="music" src="songrita.mp3" loop></audio>
</div>

<script src="script.js"></script>
</body>
</html>
