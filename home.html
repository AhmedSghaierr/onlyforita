<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Little World 💗</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="hearts"></div>
<div class="container">

  <!-- Good Morning / Good Night -->
  <h2 id="gmgn"></h2>

  <!-- Relationship counter -->
  <h2 id="counter"></h2>

  <!-- Main photo + random greeting -->
  <img id="mainPhoto">
  <p id="photoGreeting"></p>

  <!-- Animated Love Heart -->
  <div id="loveContainer">
    <img id="loveHeart" src="images/love_heart.png">
    <span id="loveNumber">0</span>
  </div>

  <!-- Heart Menu -->
  <div class="heartMenu">
    <button onclick="showSection('loveLetter')">Love Letter</button>
    <button onclick="showSection('music')">Music</button>
    <button onclick="showSection('notes')">Notes</button>
    <button onclick="showSection('gallery')">Gallery</button>
    <button onclick="showSection('openWhen')">Open When</button>
  </div>

  <!-- Sections -->
  <div id="loveLetter" class="section"><p id="loveLetterText"></p></div>
  <div id="music" class="section">
    <div id="musicList"></div>
  </div>
  <div id="notes" class="section"></div>
  <div id="gallery" class="section">
      <h3>Her Photos</h3>
      <div class="photoWall"></div>
      <p id="photoMessage"></p>
      <h3>Our Memories</h3>
      <div class="memoriesWall"><p>Our memories will start here soon.</p></div>
  </div>
  <div id="openWhen" class="section">
      <h3>Open When...</h3>
      <div class="openContainer">
          <div class="openCard" onclick="openMsg(0)">Sad</div>
          <div class="openCard" onclick="openMsg(1)">Miss Me</div>
          <div class="openCard" onclick="openMsg(2)">Can't Sleep</div>
          <div class="openCard" onclick="openMsg(3)">Need Motivation</div>
          <div class="openCard" onclick="openMsg(4)">Thinking About Us</div>
      </div>
      <div id="openTextBox"><p id="openText"></p></div>
  </div>

  <!-- Random Quote -->
  <p id="quote" class="quote"></p>

  <!-- Background music auto (songrita) -->
  <audio id="songrita" src="songrita.mp3" loop></audio>
</div>
<script src="script.js"></script>
</body>
</html>
